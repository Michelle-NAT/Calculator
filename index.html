<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="container">
            <!--Mode goes here  -->
            <div class="mode-switch">
                <button id="calcMode" class="active">Calculator</button>
                <button id="convMode">Converter</button>
            </div>
            <!--Display goes here  -->
            <div class="display">
                <input type="text" id="display" readonly value="0"/>
        </div>
        <!--Calculator  -->
        <div class="calculator-grid">
            <button class="btn action">C</button>
            <button class="btn action">DEL</button>
            <button class="btn operator">/</button>
            <button class="btn operator">*</button>

            <button class="btn">7</button>
            <button class="btn">8</button>
            <button class="btn">9</button>
            <button class="btn operator">-</button>

            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">6</button>
            <button class="btn operator">+</button>

            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">3</button>
            <button class="btn equal">=</button>

            <button class="btn zero">0</button>
            <button class="btn">.</button>
        </div>

        <!--Converter  -->
        <div class="converter hidden">
            <input type="number" id="amount" placeholder="Enter amount"/>
            <div class="currency-row">
                <select id="fromCurrency">
                    <option>USD</option>
                    <option>EUR</option>
                    <option>GBP</option>
                </select>
                <span>to</span>
                <select id="toCurrency">
                    <option>KES</option>
                    <option>USD</option>
                    <option>EUR</option>
                </select>
            </div>

            <button class="convert-btn">Convert</button>
            <div class="result">Result: <span id="result">0</span></div>
    </div>
</body>
<script src="/src/main.js"></script>
</html>
